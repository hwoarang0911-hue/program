<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연주자 페이지 — 시간 위에 쌓인 소리</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body">

  <div class="login-overlay" id="login-overlay">
    <div class="login-box">
      <div class="login-logo">연음</div>
      <div class="login-sub">PERFORMER PAGE · 연주자 전용 페이지</div>
      <input type="password" class="login-input" id="login-pw" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
      <button class="login-btn" id="login-btn">입장하기</button>
      <div class="login-err" id="login-err"></div>
    </div>
  </div>

  <header class="admin-header">
    <div class="admin-header-inner">
      <span class="admin-title-bar">YEUNEUM · 연주자 페이지</span>
      <a href="index.html" class="admin-back">← 관람객 페이지로 돌아가기</a>
    </div>
  </header>

  <div class="admin-hero">
    <div class="admin-hero-inner">
      <h1>프로그램 도슨트 편집</h1>
      <p>각 곡의 소개 텍스트를 수정하고, 연주자 코멘트를 입력하세요. 저장 후 관람객 페이지에 바로 반영됩니다.</p>
    </div>
  </div>

  <main class="admin-main">
    <div style="background:#fff;border:1px solid #e0ddd8;border-radius:6px;padding:1rem 1.4rem;margin-bottom:2rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;">
      <div>
        <div style="font-size:.72rem;font-weight:700;letter-spacing:.12em;color:#1b5068;margin-bottom:.3rem;text-transform:uppercase">곡 소개</div>
        <div style="font-size:.82rem;color:#555;line-height:1.6">기본 텍스트가 제공됩니다. 필요 시 수정할 수 있습니다.</div>
      </div>
      <div>
        <div style="font-size:.72rem;font-weight:700;letter-spacing:.12em;color:#4aab7c;margin-bottom:.3rem;text-transform:uppercase">● 초록 점</div>
        <div style="font-size:.82rem;color:#555;line-height:1.6">연주자 코멘트가 입력된 곡을 표시합니다.</div>
      </div>
      <div>
        <div style="font-size:.72rem;font-weight:700;letter-spacing:.12em;color:#888;margin-bottom:.3rem;text-transform:uppercase">저장</div>
        <div style="font-size:.82rem;color:#555;line-height:1.6">각 곡별로 저장하거나, 우하단의 '전체 저장'을 사용하세요.</div>
      </div>
    </div>

    <div class="admin-tab-bar">
      <button class="admin-tab-btn active" data-tab="admin-panel-1">Program 1</button>
      <button class="admin-tab-btn" data-tab="admin-panel-2">Program 2</button>
    </div>

    <div class="admin-panel active" id="admin-panel-1"></div>
    <div class="admin-panel" id="admin-panel-2"></div>
  </main>

  <div class="global-save-bar">
    <button class="btn-global" id="btn-reset">초기화</button>
    <button class="btn-global primary" id="btn-save-all">전체 저장</button>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/data.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
