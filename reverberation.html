<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>잔향의 층위 — YEONEUM</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: #f2f0eb;
      color: #1a1a1a;
      font-family: 'Georgia', 'Times New Roman', serif;
      overflow-x: hidden;
    }

    canvas#bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    main { position: relative; z-index: 1; }

    .scene {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Last scene: text at top, whole note fills lower area */
    #s4 {
      justify-content: flex-start;
      padding-top: 13vh;
    }

    .scene-inner {
      text-align: center;
      padding: 2rem;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 1.1s ease, transform 1.1s ease;
    }
    .scene-inner.visible { opacity: 1; transform: translateY(0); }
    #s0 .scene-inner     { opacity: 1; transform: translateY(0); }

    .harmonic-label {
      font-size: 0.58rem;
      letter-spacing: 0.55em;
      color: rgba(26,26,26,0.32);
      text-transform: uppercase;
      margin-bottom: 2.8rem;
    }

    .quote {
      font-size: clamp(1rem, 2.4vw, 1.45rem);
      line-height: 2.1;
      font-weight: normal;
      color: #1a1a1a;
      max-width: 460px;
    }

    .main-title {
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      font-weight: normal;
      letter-spacing: 0.04em;
      color: #1a1a1a;
      margin-bottom: 1rem;
    }

    .main-subtitle {
      font-size: 0.6rem;
      letter-spacing: 0.55em;
      color: rgba(26,26,26,0.3);
      text-transform: uppercase;
    }

    .scroll-hint {
      position: absolute;
      bottom: 2.8rem;
      font-size: 0.58rem;
      letter-spacing: 0.45em;
      color: rgba(26,26,26,0.28);
      text-transform: uppercase;
      animation: drift 2.8s ease-in-out infinite;
    }
    @keyframes drift {
      0%, 100% { opacity:.28; transform:translateY(0); }
      50%       { opacity:.6;  transform:translateY(5px); }
    }

    .back-link {
      position: fixed;
      top: 1.6rem; left: 1.6rem;
      z-index: 10;
      font-size: 0.58rem;
      letter-spacing: 0.38em;
      color: rgba(26,26,26,0.3);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.25s;
    }
    .back-link:hover { color: #1a1a1a; }

    .progress-track {
      position: fixed;
      right: 1.8rem; top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
    .progress-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(26,26,26,0.18);
      transition: background 0.4s, transform 0.4s;
    }
    .progress-dot.active {
      background: rgba(26,26,26,0.7);
      transform: scale(1.6);
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-link">← 돌아가기</a>

  <nav class="progress-track" aria-hidden="true">
    <div class="progress-dot active"></div>
    <div class="progress-dot"></div>
    <div class="progress-dot"></div>
    <div class="progress-dot"></div>
    <div class="progress-dot"></div>
  </nav>

  <canvas id="bg"></canvas>

  <main>
    <section class="scene" id="s0">
      <div class="scene-inner">
        <div class="main-title">잔향의 층위</div>
        <div class="main-subtitle">Layers of Reverberation &nbsp;·&nbsp; YEONEUM 2026</div>
      </div>
      <div class="scroll-hint">scroll</div>
    </section>

    <section class="scene" id="s1">
      <div class="scene-inner">
        <div class="harmonic-label">8th Harmonic &nbsp;·&nbsp; 제8배음</div>
        <div class="quote">소리는 사라지지 않는다<br>당신 안에 쌓일 뿐이다</div>
      </div>
    </section>

    <section class="scene" id="s2">
      <div class="scene-inner">
        <div class="harmonic-label">4th Harmonic &nbsp;·&nbsp; 제4배음</div>
        <div class="quote">파동이 파동을 만날 때<br>세계는 잠시 더 넓어진다</div>
      </div>
    </section>

    <section class="scene" id="s3">
      <div class="scene-inner">
        <div class="harmonic-label">2nd Harmonic &nbsp;·&nbsp; 제2배음</div>
        <div class="quote">잔향은 소리가 아니다<br>소리가 남긴 시간이다</div>
      </div>
    </section>

    <section class="scene" id="s4">
      <div class="scene-inner">
        <div class="harmonic-label">Fundamental &nbsp;·&nbsp; 근음</div>
        <div class="quote">마지막 음이 사라진 자리에<br>모든 음이 남는다</div>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('bg');
    const ctx    = canvas.getContext('2d');
    let W, H;

    const lerp  = (a, b, t) => a + (b - a) * t;
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
    const ease  = t => t * t * (3 - 2 * t);

    const GRID = 24;
    let   animTime = 0;

    // 5 distinct visual layers — radial waves from off-screen centers.
    // cx/cy are viewport-fraction coords of the origin (values outside 0–1 = off-screen).
    // s0 has negative base so only wave peaks show → very sparse opening dots.
    const LAYERS = [
      { nh:2, freq:0.040, amp:1.0, base:-0.6, cx:-0.28, cy:-0.38 }, // s0: sparse opening
      { nh:8, freq:0.082, amp:1.8, base:1.4,  cx: 1.35, cy:-0.12 }, // s1: 8배음
      { nh:4, freq:0.046, amp:4.8, base:2.5,  cx:-0.40, cy: 0.58 }, // s2: 4배음
      { nh:2, freq:0.026, amp:7.0, base:4.0,  cx: 1.22, cy: 1.28 }, // s3: 2배음
      { nh:1, freq:0.018, amp:1.5, base:1.0,  cx: 0.48, cy:-0.85 }, // s4: fundamental
    ];

    function lerpLayer(a, b, t) {
      return {
        nh:   lerp(a.nh,   b.nh,   t),
        freq: lerp(a.freq, b.freq, t),
        amp:  lerp(a.amp,  b.amp,  t),
        base: lerp(a.base, b.base, t),
        cx:   lerp(a.cx,   b.cx,   t),
        cy:   lerp(a.cy,   b.cy,   t),
      };
    }

    // Finale: two plane waves at close angles create interference bands —
    // complex diagonal moiré that slowly drifts, like reverb dissolving into air.
    function finaleWeight(x, y) {
      const f  = 0.022;
      const w1 = Math.sin(x * f * Math.cos(0.52) + y * f * Math.sin(0.52) + animTime * 0.12);
      const w2 = Math.sin(x * f * Math.cos(0.80) + y * f * Math.sin(0.80) - animTime * 0.09);
      return clamp((w1 * w2 + 1) * 0.5, 0, 1);
    }

    function render() {
      const scrollMax = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
      const rawP = clamp(window.scrollY / scrollMax, 0, 1);

      // Which transition segment (0–3) and progress within it
      const seg  = Math.min(3, Math.floor(rawP * 4));
      const segP = ease(clamp(rawP * 4 - seg, 0, 1));
      const st   = lerpLayer(LAYERS[seg], LAYERS[seg + 1], segP);

      // Droplet ripple: fades in during s4 (rawP 0.72 → 1.0)
      const noteBlend = ease(clamp((rawP - 0.72) / 0.28, 0, 1));

      // Wave phase: scroll-driven + slow time drift so it idles gently
      const phase = window.scrollY * 0.016 + animTime * 0.18;

      // Background subtly darkens
      const bg = Math.round(lerp(242, 229, rawP));
      ctx.fillStyle = `rgb(${bg},${bg - 2},${bg - 5})`;
      ctx.fillRect(0, 0, W, H);

      const cols = Math.ceil(W / GRID) + 2;
      const rows = Math.ceil(H / GRID) + 2;
      const nh   = Math.max(1, Math.round(st.nh));

      for (let r = 0; r <= rows; r++) {
        for (let c = 0; c <= cols; c++) {
          const x = c * GRID;
          const y = r * GRID;

          // Radial waves from off-screen origin — concentric rings passing through viewport.
          const ocx  = W * st.cx;
          const ocy  = H * st.cy;
          const ddx  = x - ocx;
          const ddy  = y - ocy;
          const dist = Math.sqrt(ddx * ddx + ddy * ddy);
          let wave = 0;
          for (let n = 1; n <= nh; n++) {
            wave += Math.sin(dist * st.freq * n - phase * n) / n;
          }
          wave /= nh > 1 ? 1.5 : 1.0;

          const wR = clamp(st.base + wave * st.amp, 0.15, GRID * 0.46);
          const wA = clamp(0.03 + (wave + 1) * 0.20, 0.01, 0.48);

          // Interference finale: moiré bands pulse from near-invisible to present
          const nw = finaleWeight(x, y);
          const nR = lerp(0.5, GRID * 0.42, nw);
          const nA = lerp(0.02, 0.52, nw);

          const radius = lerp(wR, nR, noteBlend);
          const alpha  = lerp(wA, nA, noteBlend);

          if (radius < 0.18) continue;

          ctx.beginPath();
          ctx.arc(x, y, radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(16,16,16,${alpha.toFixed(2)})`;
          ctx.fill();
        }
      }
    }

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      render();
    }
    resize();
    window.addEventListener('resize', resize);

    // Animation loop: time advances every frame for idle drift; scroll drives wave phase
    let prevTs = null;
    (function loop(ts) {
      if (prevTs !== null) animTime += (ts - prevTs) * 0.001;
      prevTs = ts;
      render();
      requestAnimationFrame(loop);
    })();

    // Text fade-in + progress dots
    const scenes  = document.querySelectorAll('.scene');
    const navDots = document.querySelectorAll('.progress-dot');

    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        const inner = e.target.querySelector('.scene-inner');
        if (inner && e.target.id !== 's0') {
          inner.classList.toggle('visible', e.isIntersecting);
        }
        if (e.isIntersecting) {
          const idx = Array.from(scenes).indexOf(e.target);
          navDots.forEach((d, i) => d.classList.toggle('active', i === idx));
        }
      });
    }, { threshold: 0.5 });

    scenes.forEach(s => obs.observe(s));
  </script>
</body>
</html>
